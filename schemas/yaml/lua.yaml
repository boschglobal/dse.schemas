---
openapi: 3.0.0
info:
  title: Lua
paths:
  /LuaFunction:
    get:
      responses:
        '200':
          description: ''
          content:
            text/yaml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LuaFunction'

components:
  schemas:
    LuaFunction:
      type: object
      description: A Lua script/function block.
      required:
        - lua
      properties:
        lua:
          type: string
          description: Inline Lua script. Multi-line strings supported.
