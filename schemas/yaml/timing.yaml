---
openapi: 3.0.0
info:
  title: Timing
paths:
  /Timing:
    get:
      responses:
        '200':
          description: ''
          content:
            text/yaml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Timing'

components:
  schemas:
    Timing:
      type: object
      description: A timing block.
      properties:
        phase:
          type: number
          description: Phase offset relative to source or reference.
        interval:
          type: number
          description: Time interval between updates, samples, or cycles.